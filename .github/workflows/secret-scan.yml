name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so secrets in past commits are caught
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action is free for individuals and public repos.
          # For an ORGANISATION-owned repo, set a (free) GITLEAKS_LICENSE secret:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
